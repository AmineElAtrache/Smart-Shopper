global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: smart-shopper-agents
    metrics_path: /metrics
    static_configs:
      - targets:
          - "orchestrator:8000"
          - "scraper:8000"
          - "decision:8000"
          - "generator:8000"
          - "ambient:8000"
          - "governance:8000"
          - "gateway:8000"
          - "ner:8000"
