services:
  kafka:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    extends:
      file: docker-compose.yml
      service: kafka

  redis:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    extends:
      file: docker-compose.yml
      service: redis

  mongodb:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    extends:
      file: docker-compose.yml
      service: mongodb

  ner:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: docker/Dockerfile.ner
    restart: unless-stopped
    environment:
      SERVICE_NAME: ner
      NER_GRPC_PORT: "50051"
      HF_HOME: /models/huggingface
      SMART_SHOPPER_NER_BACKEND: auto
      SMART_SHOPPER_NER_MODEL: ElAtrachAMINE/darija-ner-xlmroberta
    ports:
      - "50051:50051"

  orchestrator:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_MODULE: agents.orchestrator.service
    restart: unless-stopped
    environment: &agent_env
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      REDIS_URL: redis://redis:6379/0
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: smart_shopper
      NER_GRPC_HOST: ner
      NER_GRPC_PORT: "50051"
      ENVIRONMENT: compose
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-llama-3.1-8b-instant}
      LLM_HTTP_BASE_URL: ${LLM_HTTP_BASE_URL:-https://api.groq.com/openai/v1}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-10.0}
      SCRAPE_MAX_CONCURRENCY: "8"
      SCRAPE_TIMEOUT_SECONDS: "40"
      SCRAPE_COLLECTION_GRACE_SECONDS: "10"
      SCRAPE_ROUTE_PROVIDERS: "true"
      SCRAPE_ROUTE_USE_LLM: "${SCRAPE_ROUTE_USE_LLM:-true}"
      SCRAPE_ENRICH_ENTITIES_LLM: "${SCRAPE_ENRICH_ENTITIES_LLM:-true}"
      SCRAPE_SOFT_COLOR_FALLBACK: "${SCRAPE_SOFT_COLOR_FALLBACK:-true}"
      DECISION_BATCH_WAIT_SECONDS: "8"
      SCRAPE_PLAYWRIGHT_PROVIDERS: avito,palmarosa
      SCRAPE_MOCK_ONLY: "false"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      ner:
        condition: service_healthy

  scraper:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_MODULE: agents.webscraping.agent
    restart: unless-stopped
    environment:
      <<: *agent_env
      SERVICE_NAME: scraper
    depends_on:
      kafka:
        condition: service_healthy

  decision:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_MODULE: agents.decision.service
    restart: unless-stopped
    environment:
      <<: *agent_env
      SERVICE_NAME: decision
    depends_on:
      kafka:
        condition: service_healthy

  generator:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_MODULE: agents.agent_generator.agent
    restart: unless-stopped
    environment:
      <<: *agent_env
      SERVICE_NAME: generator
      LLM_PROVIDER: ${LLM_PROVIDER:-template}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-llama-3.1-8b-instant}
      LLM_HTTP_BASE_URL: ${LLM_HTTP_BASE_URL:-https://api.groq.com/openai/v1}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-10.0}
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  ambient:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_MODULE: agents.ambient_scheduler.scheduler
    restart: unless-stopped
    environment:
      <<: *agent_env
      SERVICE_NAME: ambient
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  governance:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_MODULE: agents.governance.agent
    restart: unless-stopped
    environment:
      <<: *agent_env
      SERVICE_NAME: governance
    depends_on:
      kafka:
        condition: service_healthy

  gateway:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_MODULE: gateway.telegram_proxy
    restart: unless-stopped
    environment:
      <<: *agent_env
      SERVICE_NAME: gateway
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy

volumes:
  redis_data:
  mongo_data:
