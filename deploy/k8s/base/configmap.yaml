apiVersion: v1
kind: ConfigMap
metadata:
  name: smart-shopper-config
data:
  ENVIRONMENT: production
  LOG_LEVEL: INFO
  METRICS_HOST: 0.0.0.0
  METRICS_PORT: "8000"
  KAFKA_CLIENT_ID: smart-shopper
  KAFKA_DEAD_LETTER_ENABLED: "true"
  NER_GRPC_HOST: smart-shopper-ner
  NER_GRPC_PORT: "50051"
  NER_GRPC_TIMEOUT_SECONDS: "5.0"
  DECISION_BATCH_WAIT_SECONDS: "2.0"
  CACHE_TTL_SECONDS: "1800"
  SCRAPE_TIMEOUT_SECONDS: "30.0"
  SCRAPE_MAX_CONCURRENCY: "17"
  SCRAPE_PLAYWRIGHT_PROVIDERS: "avito,palmarosa"
  SCRAPE_MOCK_ONLY: "false"
  DOMAIN_RATE_LIMIT_PER_MINUTE: "30"
  LLM_PROVIDER: template
  LLM_MODEL: llama-3.1-8b-instant
  LLM_TIMEOUT_SECONDS: "10.0"
