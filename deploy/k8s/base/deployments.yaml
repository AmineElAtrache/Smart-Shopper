apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-shopper-ner
spec:
  replicas: 1
  selector:
    matchLabels: { app: smart-shopper-ner }
  template:
    metadata:
      labels: { app: smart-shopper-ner }
    spec:
      containers:
        - name: ner
          image: smart-shopper/ner:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: smart-shopper-config }
            - secretRef: { name: smart-shopper-secrets }
          ports:
            - { name: grpc, containerPort: 50051 }
            - { name: metrics, containerPort: 8000 }
          resources:
            requests: { cpu: "1000m", memory: "3Gi" }
            limits: { cpu: "2", memory: "6Gi" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-shopper-orchestrator
spec:
  replicas: 2
  selector:
    matchLabels: { app: smart-shopper-orchestrator }
  template:
    metadata:
      labels: { app: smart-shopper-orchestrator }
    spec:
      containers:
        - name: orchestrator
          image: smart-shopper/service:latest
          imagePullPolicy: IfNotPresent
          env:
            - { name: SERVICE_MODULE, value: agents.orchestrator.service }
            - { name: SERVICE_NAME, value: orchestrator }
          envFrom:
            - configMapRef: { name: smart-shopper-config }
            - secretRef: { name: smart-shopper-secrets }
          ports:
            - { name: metrics, containerPort: 8000 }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
