apiVersion: v1
kind: Secret
metadata:
  name: smart-shopper-secrets
type: Opaque
stringData:
  KAFKA_BOOTSTRAP_SERVERS: replace-with-msk-bootstrap
  REDIS_URL: redis://replace-with-elasticache:6379/0
  MONGO_URI: mongodb://replace-with-mongodb:27017
