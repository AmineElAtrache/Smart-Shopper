  TELEGRAM_BOT_TOKEN: replace-with-telegram-token
  LLM_HTTP_BASE_URL: https://api.groq.com/openai/v1
  LLM_API_KEY: replace-with-llm-api-key
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
